<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmarker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-dots">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <button class="modal-close" id="modalClose">&times;</button>
        <p class="modal-msg">Site Name or Url is not valid, Please follow the rules below :</p>
        <ul class="modal-list">
          <li><i class="fa-solid fa-circle-arrow-right"></i> Site name must contain at least 3 characters</li>
          <li><i class="fa-solid fa-circle-arrow-right"></i> Site URL must be a valid one</li>
        </ul>
      </div>
    </div>

    
    <div class="logo-wrapper">
      <div class="logo-box">Bookmarker</div>
    </div>

    <div class="container">

      <div class="top-divider"></div>

      <h1><i class="fa-solid fa-bookmark title-icon"></i> Bookmark your favorite sites <i class="fa-solid fa-bookmark title-icon"></i></h1>

      
      <div class="form-section">

        <div class="form-group">
          <label for="siteName">
            <i class="fa-solid fa-table-list"></i> Site Name
          </label>
          <input type="text" id="siteName" placeholder="Bookmark Name" />
        </div>

        <div class="form-group">
          <label for="siteUrl">
            <i class="fa-solid fa-link"></i> Site URL
          </label>
          <input type="text" id="siteUrl" placeholder="Website URL" />
        </div>

        <div class="btn-wrapper">
          <button id="addBtn">Submit</button>
        </div>

      </div>

      <div class="bottom-divider"></div>

      
      <table id="bookmarkTable">
        <thead>
          <tr>
            <th>Index</th>
            <th>Website Name</th>
            <th>Visit</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

    </div>

    <script src="script.js"></script>
  </body>
</html>
